<!DOCTYPE html>
<html>
<head>
  <title>My-Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="charlotte_favicon.ico" />

  <style>
    body {
      margin: 0;
    }

    .top {
      height: 20vh;
      border: 1px solid gray;
    }

    .bottom {
      display: flex;
      height: 80vh;
    }

    .left {
      width: 15%;
      border: 1px solid gray;
    }

    .middle {
      width: 60%;
      border: 1px solid gray;
    }

    .right {
      flex: 1;
      border: 1px solid gray;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- Top frame -->
  <div class="top">
    <iframe src="rows.html"></iframe>
  </div>

  <!-- Bottom frames -->
  <div class="bottom">
    <div class="left">
      <iframe src="cols1.html"></iframe>
    </div>

    <div class="middle">
      <iframe src="cols2.html"></iframe>
    </div>

    <div class="right">
      <iframe src="cols3_css.html"></iframe>
    </div>
  </div>

</body>
</html>
